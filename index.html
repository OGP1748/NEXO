<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO - Hub</title>
    <!-- Fonte Inter para um visual limpo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Ícones FontAwesome para o cadeado do Management -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --walmart-blue: #004f9f; /* Tom de azul clássico */
            --text-dark: #000000;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            background-color: #ffffff; /* Fundo totalmente branco */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Container Principal (Sem a borda preta de delimitação) */
        .page-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabeçalho de 3 Colunas */
        .header-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            gap: 10px;
        }

        /* Lado Esquerdo: Logo Walmart */
        .logo-walmart {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0071dc;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .logo-walmart span {
            color: #ffc220; /* Solzinho amarelo */
            font-size: 1.2rem;
        }

        /* Centro: NEXO */
        .logo-nexo {
            text-align: center;
        }
        .logo-nexo h1 {
            color: #004f9f;
            font-weight: 800;
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Lado Direito: Developed by Store */
        .developed-by {
            text-align: right;
            font-size: 0.75rem;
            font-weight: 700;
            color: #000000;
            line-height: 1.1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }
        .developed-by span {
            color: #0071dc; /* Número da store */
        }
        .developed-by i {
            color: #0071dc;
            font-size: 0.9rem;
        }

        /* Subtítulo centralizado abaixo do grid */
        .subtitle {
            font-size: 0.8rem;
            color: #333333;
            margin-top: 5px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        /* Linha divisória horizontal */
        .divider {
            width: 100%;
            border: none;
            border-top: 1px solid #555555;
            margin-bottom: 45px;
        }

        /* Saudação */
        .greeting {
            font-size: 1.6rem;
            font-weight: 500;
            color: #000000;
            margin-bottom: 50px;
            text-align: center;
        }

        /* Lista de Menus (6 botões) */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        /* Botões Azuis estilo Pílula */
        .btn-nexo {
            background-color: var(--walmart-blue);
            color: #ffffff;
            border: none;
            padding: 16px 20px;
            font-size: 1.25rem;
            font-weight: 500;
            border-radius: 50px; /* Formato pílula */
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 56px;
            box-sizing: border-box;
        }

        /* Ícone de Cadeado pequeno */
        .btn-nexo i {
            font-size: 1.05rem;
            opacity: 0.8;
        }

        /* Efeitos de Interação */
        .btn-nexo:hover {
            background-color: #003b75;
            transform: scale(1.01);
        }

        .btn-nexo:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <!-- Cabeçalho Superior -->
        <div class="header-grid">
            <div class="logo-walmart">Walmart<span>☀️</span></div>
            <div class="logo-nexo">
                <h1>NEXO</h1>
            </div>
            <div class="developed-by">
                <div>DEVELOPED BY<br><span>STORE 1748</span></div>
                <i class="fa-solid fa-asterisk"></i>
            </div>
        </div>
        
        <!-- Subtítulo -->
        <div class="subtitle">Network for Employee Management and Operations</div>
        
        <!-- Linha Horizontal -->
        <hr class="divider">

        <!-- Saudação Central -->
        <div class="greeting">Hello Associate</div>

        <!-- Lista de Botões -->
        <div class="menu-list">
            <!-- Botão 1: Management -->
            <button class="btn-nexo" onclick="window.location.href='mngt.html'">
                <i class="fa-solid fa-lock"></i> Management
            </button>
            
            <!-- Botão 2: TC Check In/Out -->
            <button class="btn-nexo">TC Check In/Out</button>
            
            <!-- Botões em branco aguardando funções -->
            <button class="btn-nexo"></button>
            <button class="btn-nexo"></button>
            <button class="btn-nexo"></button>
            <button class="btn-nexo"></button>
        </div>

    </div>

</body>
</html>
